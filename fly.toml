# fly.toml app configuration file generated for actual-ai on 2026-04-05T05:47:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'actual-ai'
primary_region = 'dfw'

[build]

[env]
PORT = '5006'
TINI_SUBREAPER = '1'

[[mounts]]
source = 'actual_data'
destination = '/data'

[http_service]
internal_port = 5006
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0

[http_service.concurrency]
type = 'connections'
hard_limit = 25
soft_limit = 20

[[http_service.checks]]
interval = '15s'
timeout = '2s'
grace_period = '10s'
method = 'GET'
path = '/'

[[vm]]
cpu_kind = 'shared'
cpus = 1
memory_mb = 256
