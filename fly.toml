[env]
PORT = "5006"
TINI_SUBREAPER = "1"

[mounts]
source = "actual_data"
destination = "/data"

[http_service]
internal_port = 5006
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

[http_service.concurrency]
type = "connections"
hard_limit = 25
soft_limit = 20

[[http_service.checks]]
grace_period = "10s"
interval = "15s"
method = "GET"
path = "/"
timeout = "2s"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 256
